spring.application.name=Skill_Hub_Learning_Platform

# DATABASE
# Override via env vars (e.g. DB_URL) in production or Docker.
# For local dev outside Docker: DB should be on localhost:5432.
# For Docker Compose: docker-compose.yml overrides DB_URL with 'db' hostname.
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/learning_academy}
spring.datasource.username=${DB_USERNAME:ali}
spring.datasource.password=${DB_PASSWORD:12345}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / HIBERNATE
# Dev: Hibernate manages schema via ddl-auto for fast iteration.
# Prod: Flyway is the sole schema authority (ddl-auto=none in application-prod.properties).
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=${FORMAT_SQL:true}
spring.jpa.open-in-view=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# Flyway is DISABLED in dev to avoid conflict with ddl-auto=update.
# Enable it in prod profile (application-prod.properties) where ddl-auto=none.
spring.flyway.enabled=false

# REDIS / CACHE
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.cache.type=${CACHE_TYPE:simple}

# JWT
# No fallback default for secret-key — it MUST be provided via env var (JWT_SECRET) or .env.
# This ensures the app fails fast at startup if the secret is missing in production.
application.security.jwt.secret-key=${JWT_SECRET}
application.security.jwt.expiration=${JWT_EXPIRATION:86400000}

# SERVER
server.port=${SERVER_PORT:8080}

# LOGGING
logging.level.com.example.Skill_Hub_Learning_Platform=DEBUG
logging.level.org.springframework.security=INFO
