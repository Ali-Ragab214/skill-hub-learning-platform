spring.application.name=Skill_Hub_Learning_Platform

# Database (override via env vars in production)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/learning_academy}
spring.datasource.username=${DB_USERNAME:ali}
spring.datasource.password=${DB_PASSWORD:12345}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.jpa.show-sql=${SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=${FORMAT_SQL:true}
spring.jpa.open-in-view=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# JWT (override via env vars in production)
application.security.jwt.secret-key=${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
application.security.jwt.expiration=${JWT_EXPIRATION:86400000}

# Server
server.port=${SERVER_PORT:8080}

# Logging
logging.level.com.example.Skill_Hub_Learning_Platform=DEBUG
logging.level.org.springframework.security=INFO
