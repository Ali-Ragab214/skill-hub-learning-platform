# ===================================================================
# PRODUCTION PROFILE — overrides application.properties
# Activated by SPRING_PROFILES_ACTIVE=prod (set in docker-compose.yml)
# ===================================================================

# ---- Flyway (sole schema authority in prod) ----
spring.flyway.enabled=true
spring.flyway.clean-disabled=true
spring.jpa.hibernate.ddl-auto=none

# ---- SQL logging off in prod ----
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# ---- Redis: always required in prod ----
spring.cache.type=redis
spring.data.redis.host=${REDIS_HOST:redis}
spring.data.redis.port=${REDIS_PORT:6379}

# ---- Connection pooling tuned for prod ----
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000

# ---- Logging: WARN+ only ----
logging.level.com.example.Skill_Hub_Learning_Platform=WARN
logging.level.org.springframework.security=WARN

# ---- JWT: no defaults here — secrets must come from env ----
